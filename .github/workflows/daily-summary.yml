name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 08:00 Asia/Shanghai (00:00 UTC)
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon --hours 24

      - name: Send to Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          SUMMARY_FILE=$(ls -t data/summaries/*.md 2>/dev/null | head -1 || true)
          [ -z "$SUMMARY_FILE" ] && echo "No summary, skipping" && exit 0

          # Write Python sender script to /tmp to avoid YAML heredoc indentation issues
          printf '%s\n' \
            'import os, json, glob, urllib.request' \
            '' \
            'token = os.environ["TELEGRAM_BOT_TOKEN"]' \
            'chat_id = os.environ["TELEGRAM_CHAT_ID"]' \
            '' \
            'files = sorted(glob.glob("data/summaries/*.md"))' \
            'if not files: exit(0)' \
            '' \
            'with open(files[-1], encoding="utf-8") as f:' \
            '    text = f.read()' \
            '' \
            'base_title = os.path.splitext(os.path.basename(files[-1]))[0]' \
            '# Split into chunks of 3900 chars (Telegram limit is 4096)' \
            'chunks = [text[i:i+3900] for i in range(0, len(text), 3900)]' \
            '' \
            'for i, chunk in enumerate(chunks):' \
            '    if i == 0:' \
            '        msg = f"🌅 Horizon 日报 - {base_title}\n\n{chunk}"' \
            '    else:' \
            '        msg = f"〔续〕\n\n{chunk}"' \
            '    if not msg.strip(): continue' \
            '    cid = int(chat_id) if chat_id.isdigit() else chat_id' \
            '    payload = json.dumps({"chat_id": cid, "text": msg}).encode()' \
            '    url = f"https://api.telegram.org/bot{token}/sendMessage"' \
            '    req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"})' \
            '    resp = urllib.request.urlopen(req)' \
            '    print(f"Sent chunk {i+1}/{len(chunks)} ({resp.status})")' \
            > /tmp/tg_sender.py

          python3 /tmp/tg_sender.py

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
