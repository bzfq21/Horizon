name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 08:00 Asia/Shanghai (00:00 UTC)
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: uv run horizon --hours 24

      - name: Send to Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          SUMMARY_FILE=$(ls -t data/summaries/*.md 2>/dev/null | head -1 || true)
          [ -z "$SUMMARY_FILE" ] && echo "No summary, skipping" && exit 0

          # Write Python sender script to /tmp to avoid YAML heredoc indentation issues
          # Parses markdown: each "## [Title](url)" block → extract title+url+summary (until noise markers)
          # Sends ONE compact message with all items, no chunking
          printf '%s\n' \
            'import os, re, json, glob, urllib.request' \
            '' \
            'token = os.environ["TELEGRAM_BOT_TOKEN"]' \
            'chat_id = os.environ["TELEGRAM_CHAT_ID"]' \
            '' \
            'files = sorted(glob.glob("data/summaries/*.md"))' \
            'if not files: exit(0)' \
            '' \
            'with open(files[-1], encoding="utf-8") as f:' \
            '    text = f.read()' \
            '' \
            'h = re.search(r"^# (.+)", text)' \
            'header = h.group(1) if h else "Horizon 日报"' \
            '' \
            'noise_starts = (' \
            '    "**背景**", "**Background**",' \
            '    "**社区讨论**", "**Discussion**",' \
            '    "**标签**", "**Tags**",' \
            '    "**参考链接**", "**References**",' \
            '    "<details>",' \
            ')' \
            '' \
            'items = []' \
            'for sec in text.split("\n---\n"):' \
            '    m = re.search(r"^## \[(.+?)\]\((.+?)\)", sec, re.MULTILINE)' \
            '    if not m: continue' \
            '    title, url = m.group(1), m.group(2)' \
            '    body_lines = []' \
            '    capture = False' \
            '    for line in sec.split("\n"):' \
            '        if line.startswith("## ["):' \
            '            capture = True' \
            '            continue' \
            '        if capture:' \
            '            s = line.strip()' \
            '            if any(s.startswith(n) for n in noise_starts): break' \
            '            if s == "---": break' \
            '            body_lines.append(line)' \
            '    body = re.sub(r"\n{3,}", "\n\n", "".join(body_lines).strip())' \
            '    if len(body) > 200:' \
            '        cut = body[:200]; idx = max(cut.rfind(c) for c in "。！？.!?\n")' \
            '        if idx > 80: cut = cut[:idx+1]' \
            '        body = cut.rstrip() + "…"' \
            '    items.append((title, url, body))' \
            '' \
            'msg_parts = [f"📡 {header}"]' \
            'for i, (title, url, body) in enumerate(items, 1):' \
            '    msg_parts.append(f"\n\n{i}. {title}")' \
            '    msg_parts.append(f"\n   {url}")' \
            '    if body:' \
            '        msg_parts.append(f"\n   {body}")' \
            'msg = "".join(msg_parts)' \
            '' \
            'while len(msg) > 4000 and len(items) > 1:' \
            '    items.pop()' \
            '    msg_parts = [f"📡 {header}"]' \
            '    for i, (title, url, body) in enumerate(items, 1):' \
            '        msg_parts.append(f"\n\n{i}. {title}")' \
            '        msg_parts.append(f"\n   {url}")' \
            '        if body:' \
            '            msg_parts.append(f"\n   {body}")' \
            '    msg = "".join(msg_parts)' \
            '' \
            'if not items:' \
            '    msg = f"📡 {header}\n\n今日暂无重要动态。"' \
            '' \
            'cid = int(chat_id) if chat_id.isdigit() else chat_id' \
            'payload = json.dumps({"chat_id": cid, "text": msg}).encode()' \
            'api_url = "https://api.telegram.org/bot" + token + "/sendMessage"' \
            'req = urllib.request.Request(api_url, data=payload, headers={"Content-Type": "application/json"})' \
            'resp = urllib.request.urlopen(req)' \
            'print(f"Sent summary ({resp.status})")' \
            > /tmp/tg_sender.py

          python3 /tmp/tg_sender.py

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
